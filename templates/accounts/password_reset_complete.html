{% extends 'base.html' %}
{% block title %}Reset Complete{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center py-10 animate-fade-in-up">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center">
        <div class="inline-flex p-3 bg-green-50 text-green-600 rounded-2xl mb-4">
            <i data-lucide="check-circle-2" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Password Reset Complete</h2>
        <p class="text-slate-600 text-sm mt-3 leading-relaxed">
            Your password has been successfully set. You may now log in with your new credentials.
        </p>
        <div class="mt-6 pt-6 border-t border-slate-100">
            <a href="{% url 'login' %}" class="w-full btn-primary py-2.5 px-4 rounded-xl font-semibold flex items-center justify-center gap-2">
                <span>Go to Log In</span>
                <i data-lucide="log-in" class="w-4 h-4"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}
