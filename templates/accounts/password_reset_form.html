{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center py-10 animate-fade-in-up">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-purple-50 text-purple-600 rounded-2xl mb-4">
                <i data-lucide="help-circle" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Reset Password</h2>
            <p class="text-slate-500 text-sm mt-1">Enter your email and we'll send reset instructions (to the dev console)</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label for="id_email" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="email" name="email" id="id_email" required autocomplete="email"
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 text-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:bg-white transition-all text-sm"
                           placeholder="Enter your registered email">
                </div>
            </div>

            <button type="submit" class="w-full btn-primary py-3 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-md">
                <span>Send Reset Link</span>
                <i data-lucide="send" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-slate-100 text-sm text-slate-600">
            Remembered your credentials? 
            <a href="{% url 'login' %}" class="font-semibold text-purple-600 hover:text-purple-700 hover:underline">Return to login</a>
        </div>
    </div>
</div>
{% endblock %}
